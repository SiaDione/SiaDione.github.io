<html>
    <head>
        <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <title>HuH Studio Portfolio</title>
    </head>
    <body>
        <h3>HuH Studio Portfolio</h3>
        <div id="page1"></div>

        
        <script type="text/babel"> //notes basically
            const title = (<h1>HuH Studio</h1>);

            function Shoot({ portfolio, locId, shootId }) {
                const shoot = portfolio[locId].shoots[shootId];

                return (
                    <div>
                        <div>
                            <h3>{shoot.name}</h3>
                            <p>{shoot.description}</p>
                        </div>
                        <div>
                            <img 
                                src={shoot.picture} 
                                alt={shoot.name} 
                                style={{ maxWidth: "700px", maxHeight: "1000px" }}
                            />
                        </div>
                    </div>
                );
            }

            function Location({ portfolio, locId }) {
                const studio = portfolio[locId];

                return (
                    <div>
                        <h2>{studio.name}</h2>
                        <p>Location: {studio.location}</p>

                        {Object.keys(studio.shoots).map(shootId => (
                            <Shoot
                                key={shootId}
                                portfolio={portfolio}
                                locId={locId}
                                shootId={shootId}
                            />
                        ))}
                    </div>
                );
            }

            function Portfolio() {
                const [portfolio, setPortfolio] = React.useState(null);
                const [error, setError] = React.useState(null);

                React.useEffect(() => {
                    fetch("portfolio.json")
                        .then(response => {
                            if (!response.ok) {
                                throw new Error("Could not load portfolio.json");
                            }
                            return response.json();
                        })
                        .then(data => setPortfolio(data))
                        .catch(err => setError(err.message));
                }, []);

                if (error) {
                    return <p>Error: {error}</p>;
                }

                if (!portfolio) {
                    return <p>Loading portfolio...</p>;
                }

                return (
                    <div>
                        {Object.keys(portfolio).map(locId => (
                            <Location
                                key={locId}
                                portfolio={portfolio}
                                locId={locId}
                            />
                        ))}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById("page1"));
            root.render(<Portfolio />);
        </script>
    </body>
</html>
