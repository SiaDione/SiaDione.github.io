<html>
    <head>
        <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <link rel="stylesheet" href="style.css">
        <title>HuH Studio Portfolio</title>

        <meta property="og:title" content="HuH Studio Portfolio" />
        <meta property="og:description" content="Portfolio of HuH Studio's GPose Studios" />
        <meta property="og:image" content="HuH Studios logo.svg" />

        <style>
            :root{
                --main-color: #131313;
                --secondary-color: #AD3221;
                --tertiary-color: #110508;
                box-sizing: border-box;
            }
            .site-wrapper{
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                display: flex;
                justify-content: center;
                background-color: var(--main-color);
            }

            .site-main{
            }

            .inner{
            }

            .location{
                background-color: #0c0c0c;
                padding-top: 1rem;
                padding-bottom: 2rem;
                border-radius: .5rem;
                margin-top: 3rem;
            }

            .shoot{
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                background-color: var(--tertiary-color);
                padding-bottom: 1rem;
                margin-top: 2.5rem;
                border: 1px solid var(--tertiary-color);
                box-shadow: 0 18px 45px rgba(36, 29, 22, 0.09);
                transition: transform 0.25s ease, box-shadow 0.25s ease;
            }.shoot:hover{
                box-shadow: 0 28px 65px rgba(36, 29, 22, 0.3);
                transform: translateY(-8px);
            }

            .shoot-image{
                height: 400px;
                object-fit: cover;
                overflow: hidden;
                position: relative;
            }

            .logo{
                justify-content: center;
                width: 30rem;
                margin-top: 2rem;
            }

            img{
                display: block;
                width: 100%;}

            body{
                color: #ffffff;
                text-align: center;

                font-family: 'Lavishly Yours';
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url(https://fonts.gstatic.com/s/lavishlyyours/v7/jizDREVIvGwH5OjiZmX9r5z_WyUQ2zcLig.woff2) format('woff2');
                unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;

            }

            p{}

            h1,h2,h3{
            }

            .location-name{
                font-size: 4rem;
                margin-bottom: 1rem;
            }

            .shoot-title{
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }

            .portfolio{
                width: 40rem;
                margin-bottom: 3rem;
            }

        </style>
    </head>
    <body>
        <div class="site-wrapper">
            <div class="logo">
                <img src="HuH Studios logo.svg" alt="HuH Studio Logo" class="logo" />
            </div>
            <div class="site-main">
                <div class="inner" id="inner"></div>
            </div>
        </div>
        <script type="text/babel"> //notes basically
            function Shoot({ portfolio, locId, shootId }) {
                const shoot = portfolio[locId].shoots[shootId];

                return (
                    <div className="shoot">
                        <div className="shoot-image">
                            <img 
                                src={shoot.picture} 
                                alt={shoot.name} 
                            />
                        </div>
                        <div className="shoot-details">
                            <h2 className="shoot-title">{shoot.name}</h2>
                            <p>{shoot.description}</p>
                        </div>
                    </div>
                );
            }

            function Location({ portfolio, locId }) {
                const studio = portfolio[locId];

                return (
                    <div className="location">
                        <h3 className="location-name"> {studio.name} </h3>
                        <p>Location: {studio.location}</p>

                        {Object.keys(studio.shoots).map(shootId => (
                            <Shoot
                                key={shootId}
                                portfolio={portfolio}
                                locId={locId}
                                shootId={shootId}
                            />
                        ))}
                    </div>
                );
            }

            function Portfolio() {
                const [portfolio, setPortfolio] = React.useState(null);
                const [error, setError] = React.useState(null);

                React.useEffect(() => {
                    fetch("portfolio.json")
                        .then(response => {
                            if (!response.ok) {
                                throw new Error("Could not load portfolio.json");
                            }
                            return response.json();
                        })
                        .then(data => setPortfolio(data))
                        .catch(err => setError(err.message));
                }, []);

                if (error) {
                    return <p>Error: {error}</p>;
                }

                if (!portfolio) {
                    return <p>Loading portfolio...</p>;
                }

                return (
                    <div className="portfolio">
                        {Object.keys(portfolio).map(locId => (
                            <Location
                                key={locId}
                                portfolio={portfolio}
                                locId={locId}
                            />
                        ))}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById("inner"));
            root.render(<Portfolio />);
        </script>
    </body>
</html>
